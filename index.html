<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marek Šturek — GitHub Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:#030e1c;font-family:'Cabinet Grotesk',sans-serif;color:#c8e4f5;}

canvas{position:fixed;inset:0;z-index:0;}

/* ══ DESKTOP ══ */
.ui{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;
  display:grid;
  grid-template-columns:280px 1fr 220px;
  grid-template-rows:1fr;
  align-items:center;
}
.panel-left  {grid-column:1;grid-row:1;}
.panel-center{grid-column:2;grid-row:1;}
.panel-right {grid-column:3;grid-row:1;}

/* ── LEFT ── */
.panel-left{pointer-events:all;padding:0 0 0 44px;}

.nav-tag,.links-tag{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:.22em;color:#38c8ff;
  text-transform:uppercase;margin-bottom:22px;
  opacity:.75;
}

.nav-list{list-style:none;display:flex;flex-direction:column;}
.nav-list li a,
.icon-card{
  display:flex;align-items:center;gap:13px;
  padding:10px 0;
  text-decoration:none;
  color:rgba(160,215,255,.7);
  font-size:15px;font-weight:600;letter-spacing:.01em;
  transition:color .18s,transform .18s;
  white-space:nowrap;
}
.nav-list li a .dot,
.icon-card .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:rgba(56,200,255,.2);
  border:1.5px solid rgba(56,200,255,.45);
  transition:all .18s;
}
.nav-list li a:hover,
.icon-card:hover{color:#e0f4ff;transform:translateX(7px);}
.nav-list li a:hover .dot,
.icon-card:hover .dot{
  background:#38c8ff;border-color:#38c8ff;
  box-shadow:0 0 8px #38c8ff,0 0 18px rgba(56,200,255,.45);
}

/* ── CENTER ── */
.panel-center{
  pointer-events:all;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 32px;
}
.hero-name{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:clamp(52px,6.5vw,88px);
  font-weight:800;line-height:1.0;letter-spacing:-.03em;text-align:center;
  /* vivid blue-white glow */
  color:#fff;
  text-shadow:0 0 30px rgba(80,180,255,.5),0 0 70px rgba(56,160,255,.25);
  animation:fadeUp .8s .08s ease both;margin-bottom:14px;
}
.hero-sub{
  font-family:'DM Mono',monospace;font-size:13px;
  color:rgba(100,180,255,.65);letter-spacing:.12em;
  margin-bottom:36px;animation:fadeUp .8s .18s ease both;
}
.socials{
  display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
  animation:fadeUp .8s .26s ease both;
}
.social-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;
  border:1px solid rgba(56,200,255,.28);border-radius:100px;
  text-decoration:none;color:rgba(140,210,255,.75);
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;
  background:rgba(56,200,255,.06);backdrop-filter:blur(8px);
  transition:all .2s ease;
}
.social-btn:hover{
  border-color:rgba(56,200,255,.75);color:#7ee8ff;
  background:rgba(56,200,255,.13);
  box-shadow:0 0 20px rgba(56,200,255,.2);
}
.social-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;}
.social-btn .si{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── RIGHT ── */
.panel-right{
  pointer-events:all;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  padding:0 0 0 32px;
}
.icon-card svg{display:none;}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.nav-list li{animation:fadeUp .5s ease both;}
.nav-list li:nth-child(1){animation-delay:.04s}
.nav-list li:nth-child(2){animation-delay:.09s}
.nav-list li:nth-child(3){animation-delay:.13s}
.nav-list li:nth-child(4){animation-delay:.17s}
.nav-list li:nth-child(5){animation-delay:.21s}
.nav-list li:nth-child(6){animation-delay:.25s}
.nav-list li:nth-child(7){animation-delay:.29s}
.icon-card:nth-child(2){animation:fadeUp .5s .1s ease both;}
.icon-card:nth-child(3){animation:fadeUp .5s .18s ease both;}
.icon-card:nth-child(4){animation:fadeUp .5s .26s ease both;}

.footer-tag{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:.2em;color:rgba(56,200,255,.22);
  z-index:2;text-transform:uppercase;pointer-events:none;
}

/* ══ MOBILE ══ */
@media(max-width:768px){
  html,body{overflow-y:auto;height:auto;}
  canvas{position:fixed;}
  .ui{
    position:relative;
    display:flex;flex-direction:column;align-items:stretch;
    min-height:100vh;padding:0 0 48px;
  }
  .panel-left,.panel-center,.panel-right{grid-column:unset;grid-row:unset;}
  .panel-center{order:1;padding:60px 24px 32px;}
  .hero-name{font-size:clamp(40px,11vw,62px);}
  .hero-sub{margin-bottom:24px;}
  .socials{gap:8px;}
  .social-btn{padding:9px 14px;font-size:11px;}
  .panel-left{order:2;padding:0 24px 8px;}
  .panel-right{
    order:3;flex-direction:column;
    align-items:flex-start;justify-content:flex-start;
    padding:28px 24px 8px;gap:0;
  }
  .links-tag{margin-top:8px;}
  .icon-card{flex:unset;justify-content:flex-start;padding:10px 0;
    border:none;border-radius:0;background:none;
  }
  .icon-card:hover{transform:translateX(7px);}
  .footer-tag{position:relative;bottom:unset;left:unset;transform:none;text-align:center;display:block;padding:20px 0 0;}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <!-- col 1 -->
  <nav class="panel-left">
    <p class="nav-tag">// repositories</p>
    <ul class="nav-list">
      <li><a href="https://github.com/mareksturek/programming-basics" target="_blank" rel="noopener"><span class="dot"></span>Programming Basics</a></li>
      <li><a href="https://github.com/mareksturek/cheat-sheets" target="_blank" rel="noopener"><span class="dot"></span>Cheat Sheets</a></li>
      <li><a href="https://github.com/mareksturek/machine-learning" target="_blank" rel="noopener"><span class="dot"></span>Machine Learning</a></li>
      <li><a href="https://github.com/mareksturek/deep-learning" target="_blank" rel="noopener"><span class="dot"></span>Deep Learning</a></li>
      <li><a href="https://github.com/mareksturek/real-application" target="_blank" rel="noopener"><span class="dot"></span>Real Application</a></li>
      <li><a href="https://github.com/mareksturek/various-projects" target="_blank" rel="noopener"><span class="dot"></span>Various Projects</a></li>
      <li><a href="https://github.com/mareksturek/data-visualization" target="_blank" rel="noopener"><span class="dot"></span>Data Visualization</a></li>
    </ul>
  </nav>

  <!-- col 2 -->
  <main class="panel-center">
    <h1 class="hero-name">Marek Šturek</h1>
    <p class="hero-sub">My GitHub Portfolio</p>
    <div class="socials">
      <a href="https://twitter.com/mareksturek" class="social-btn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        Twitter
      </a>
      <a href="https://linkedin.com/in/mareksturek/" class="social-btn" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
      <a href="https://mareksturek.com/" class="social-btn" target="_blank" rel="noopener">
        <svg class="si" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Personal
      </a>
      <a href="https://www.jehosme.com/" class="social-btn" target="_blank" rel="noopener">
        <svg class="si" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Family
      </a>
    </div>
  </main>

  <!-- col 3 -->
  <aside class="panel-right">
    <p class="links-tag">// links</p>
    <a href="https://github.com/mareksturek/lectures-related" class="icon-card" target="_blank" rel="noopener"><span class="dot"></span>Lectures</a>
    <a href="https://github.com/mareksturek/mareksturek.github.io/blob/master/mydsportfolio.pdf" class="icon-card" target="_blank" rel="noopener"><span class="dot"></span>Data Science</a>
    <a href="https://github.com/mareksturek/isibrno-related" class="icon-card" target="_blank" rel="noopener"><span class="dot"></span>Research</a>
  </aside>
</div>

<p class="footer-tag">mareksturek.github.io</p>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [];
  const mouse = {x:-9999,y:-9999};

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initNodes(){
    const count = Math.floor((W * H) / 9500);
    nodes = [];
    for(let i = 0; i < count; i++){
      nodes.push({
        x: Math.random()*W, y: Math.random()*H,
        vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
        r: Math.random()*2.8+1,
        phase: Math.random()*Math.PI*2
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // richer deep blue background
    const bg = ctx.createRadialGradient(W*.55,H*.4,0,W*.55,H*.4,Math.max(W,H));
    bg.addColorStop(0,'#071828');
    bg.addColorStop(.4,'#050f1e');
    bg.addColorStop(1,'#020810');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // center glow — more vivid
    const glow=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.4);
    glow.addColorStop(0,'rgba(20,90,200,.1)');
    glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);

    nodes.forEach(n=>{
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-10)n.x=W+10; if(n.x>W+10)n.x=-10;
      if(n.y<-10)n.y=H+10; if(n.y>H+10)n.y=-10;
      n.phase+=.013;
    });

    // edges — brighter blue
    const CONN=150;
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONN){
          const a=(1-d/CONN)*.45;
          ctx.strokeStyle=`rgba(60,190,255,${a})`;
          ctx.lineWidth=.9;
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
        }
      }
    }

    // mouse connections — vivid cyan
    const MDIST=210;
    nodes.forEach(n=>{
      const dx=n.x-mouse.x, dy=n.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<MDIST){
        ctx.strokeStyle=`rgba(80,230,255,${(1-d/MDIST)*.6})`;
        ctx.lineWidth=1.1;
        ctx.beginPath();ctx.moveTo(n.x,n.y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
      }
    });

    // nodes — bright teal-blue
    nodes.forEach(n=>{
      const pulse=(Math.sin(n.phase)+1)/2;
      const r=n.r+pulse*.8, b=.5+pulse*.45;
      ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(50,200,255,${b})`;ctx.fill();
      if(n.r>2.3){
        ctx.beginPath();ctx.arc(n.x,n.y,r+3.5,0,Math.PI*2);
        ctx.strokeStyle=`rgba(56,210,255,${b*.25})`;ctx.lineWidth=1.3;ctx.stroke();
      }
    });

    // mouse dot
    if(mouse.x>0){
      ctx.beginPath();ctx.arc(mouse.x,mouse.y,3.5,0,Math.PI*2);
      ctx.fillStyle='rgba(120,230,255,.7)';ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  window.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
  window.addEventListener('touchmove',e=>{const t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;},{passive:true});
  window.addEventListener('touchend',()=>{mouse.x=-9999;mouse.y=-9999;});
  window.addEventListener('resize',()=>{resize();initNodes();});
  resize();initNodes();draw();
})();
</script>
</body>
</html>
